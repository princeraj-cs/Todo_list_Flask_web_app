{% extends "base.html" %} {% block title %}Signup{% endblock %} {% block content
%}
<div
  class="min-h-screen flex items-center justify-center px-4 bg-gradient-to-br from-blue-50 to-indigo-50"
>
  <div class="w-full max-w-md">
    <div class="bg-white rounded-2xl border border-blue-100 p-8 shadow-lg">
      <div class="flex justify-center mb-6">
        <div
          class="w-12 h-12 bg-gradient-to-br from-indigo-600 to-blue-600 rounded-xl flex items-center justify-center"
        >
          <svg
            class="w-7 h-7 text-white"
            fill="none"
            stroke="currentColor"
            viewBox="0 0 24 24"
          >
            <path
              stroke-linecap="round"
              stroke-linejoin="round"
              stroke-width="2"
              d="M9 5H7a2 2 0 00-2 2v12a2 2 0 002 2h10a2 2 0 002-2V7a2 2 0 00-2-2h-2M9 5a2 2 0 002 2h2a2 2 0 002-2M9 5a2 2 0 012-2h2a2 2 0 012 2m-6 9l2 2 4-4"
            />
          </svg>
        </div>
      </div>
      <h1
        class="text-3xl font-light text-center mb-8 bg-gradient-to-r from-indigo-600 to-blue-600 bg-clip-text text-transparent"
      >
        Create Account
      </h1>

      <form method="POST" class="space-y-5">
        <div>
          <label
            for="email"
            class="block text-sm font-medium text-slate-700 mb-2"
            >Email Address</label
          >
          <input
            type="email"
            class="w-full px-4 py-2 border border-blue-200 rounded-lg text-slate-900 placeholder-slate-400 focus:outline-none focus:ring-2 focus:ring-indigo-500 focus:border-transparent transition-all bg-slate-50"
            id="email"
            name="email"
            placeholder="Enter your email"
            required
          />
        </div>
        <div>
          <label
            for="firstName"
            class="block text-sm font-medium text-slate-700 mb-2"
            >First Name</label
          >
          <input
            type="text"
            class="w-full px-4 py-2 border border-blue-200 rounded-lg text-slate-900 placeholder-slate-400 focus:outline-none focus:ring-2 focus:ring-indigo-500 focus:border-transparent transition-all bg-slate-50"
            id="firstName"
            name="firstName"
            placeholder="Enter your first name"
            required
          />
        </div>
        <div>
          <label
            for="password1"
            class="block text-sm font-medium text-slate-700 mb-2"
            >Password</label
          >
          <input
            type="password"
            class="w-full px-4 py-2 border border-blue-200 rounded-lg text-slate-900 placeholder-slate-400 focus:outline-none focus:ring-2 focus:ring-indigo-500 focus:border-transparent transition-all bg-slate-50"
            id="password1"
            name="password1"
            placeholder="At least 7 characters"
            required
          />
        </div>
        <div>
          <label
            for="password2"
            class="block text-sm font-medium text-slate-700 mb-2"
            >Confirm Password</label
          >
          <input
            type="password"
            class="w-full px-4 py-2 border border-blue-200 rounded-lg text-slate-900 placeholder-slate-400 focus:outline-none focus:ring-2 focus:ring-indigo-500 focus:border-transparent transition-all bg-slate-50"
            id="password2"
            name="password2"
            placeholder="Confirm your password"
            required
          />
        </div>
        <button
          type="submit"
          class="w-full px-4 py-2 bg-gradient-to-r from-indigo-600 to-blue-600 text-white rounded-lg font-medium hover:from-indigo-700 hover:to-blue-700 transition-all hover:shadow-md"
        >
          Create Account
        </button>
      </form>

      <p class="text-center text-slate-600 text-sm mt-6">
        Already have an account?
        <a
          href="/login"
          class="bg-gradient-to-r from-indigo-600 to-blue-600 bg-clip-text text-transparent font-medium hover:underline"
          >Login</a
        >
      </p>
    </div>
  </div>
</div>
{% endblock %}
